<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Gift</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #12131a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Шапка приложения */
        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #248bf2;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(36, 139, 242, 0.3);
        }

        /* Виджет баланса */
        .balance-container {
            background: linear-gradient(135deg, #1c1e27, #161720);
            border: 1px solid #232736;
            border-radius: 14px;
            padding: 10px 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .balance-text {
            font-size: 16px;
            color: #9299a9;
            font-weight: 500;
        }

        .balance-value {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
        }

        .coin-icon {
            color: #ffca28;
            font-size: 16px;
        }

        /* Рулетка */
        .roulette-section {
            width: 100%;
            max-width: 400px;
            background-color: #161720;
            border: 1px solid #222533;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            margin-bottom: 30px;
        }

        .roulette-carousel {
            display: flex;
            gap: 10px;
            overflow: hidden;
            background-color: #0f1015;
            border: 2px solid #248bf2;
            border-radius: 12px;
            padding: 12px;
            position: relative;
            margin-bottom: 20px;
        }

        /* Линия указателя по центру */
        .roulette-carousel::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: #ff334b;
            box-shadow: 0 0 8px #ff334b;
            z-index: 10;
            transform: translateX(-50%);
        }

        .item {
            min-width: 80px;
            height: 80px;
            background-color: #1c1e27;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #2d3245;
        }

        .item.common { border-color: #546e7a; color: #b0bec5; }
        .item.rare { border-color: #1e88e5; color: #64b5f6; }
        .item.legendary { border-color: #ffb300; color: #ffd54f; }

        .item-icon {
            font-size: 20px;
        }

        /* Кнопка крутить */
        .btn-spin {
            width: 100%;
            background: linear-gradient(135deg, #248bf2, #1a73e8);
            border: none;
            border-radius: 12px;
            color: white;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(36, 139, 242, 0.4);
            transition: transform 0.1s;
        }

        .btn-spin:active {
            transform: scale(0.98);
        }

        /* P2P Рынок */
        .p2p-section {
            width: 100%;
            max-width: 400px;
        }

        .p2p-title {
            font-size: 18px;
            font-weight: 700;
            color: #248bf2;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 15px;
        }

        .p2p-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .market-card {
            background-color: #161720;
            border: 1px solid #222533;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 8px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
        }

        .card-price {
            font-size: 14px;
            font-weight: 700;
            color: #ffca28;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-buy {
            width: 100%;
            background-color: #212330;
            border: 1px solid #248bf2;
            color: #248bf2;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-buy:active {
            background-color: rgba(36, 139, 242, 0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Gift Roulette</div>
        <div class="balance-container">
            <span class="balance-text">Баланс:</span>
            <span class="balance-value">0</span>
            <span class="coin-icon">🪙</span>
        </div>
    </div>

    <div class="roulette-section">
        <div class="roulette-carousel">
            <div class="item common">
                <span class="item-icon">🎁</span>
                <span>Common</span>
            </div>
            <div class="item legendary">
                <span class="item-icon">💎</span>
                <span>Legendary</span>
            </div>
            <div class="item rare">
                <span class="item-icon">⚡</span>
                <span>Rare</span>
            </div>
            <div class="item legendary">
                <span class="item-icon">💎</span>
                <span>Legendary</span>
            </div>
        </div>
        <button class="btn-spin" onclick="spinClick()">Крутить (100 🪙)</button>
    </div>

    <div class="p2p-section">
        <div class="p2p-title">P2P Рынок</div>
        <div class="p2p-grid">
            <div class="market-card">
                <span style="font-size: 24px;">🎁</span>
                <span class="card-title" style="color: #b0bec5;">Common NFT</span>
                <span class="card-price">50 🪙</span>
                <button class="btn-buy" onclick="buyClick('Common')">Купить</button>
            </div>
            <div class="market-card">
                <span style="font-size: 24px;">💎</span>
                <span class="card-title" style="color: #ffd54f;">Legendary NFT</span>
                <span class="card-price">750 🪙</span>
                <button class="btn-buy" onclick="buyClick('Legendary')">Купить</button>
            </div>
        </div>
    </div>

    <script>
        function spinClick() {
            alert("Недостаточно монет для прокрута рулетки!");
        }

        function buyClick(item) {
            alert("Недостаточно монет для покупки " + item + " NFT!");
        }
    </script>
</body>
</html>
